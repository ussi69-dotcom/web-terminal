name: Promote Dev To Main

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Source branch or ref to promote"
        required: false
        default: dev
      enable_auto_merge:
        description: "Enable GitHub auto-merge on the promotion PR"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: promote-dev-to-main
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure source ref exists
        run: git fetch origin "${{ inputs.source_ref }}"

      - name: Create or update promotion PR
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail
          existing_pr=$(gh pr list \
            --base main \
            --head "$SOURCE_REF" \
            --state open \
            --json number \
            --jq '.[0].number')

          title="Promote ${SOURCE_REF} to main"
          body=$(cat <<MARKDOWN
          Automated promotion PR from \`${SOURCE_REF}\` into \`main\`.

          - source ref: \`${SOURCE_REF}\`
          - triggered by: \`${{ github.actor }}\`
          - run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MARKDOWN
          )

          if [[ -n "${existing_pr}" && "${existing_pr}" != "null" ]]; then
            gh pr edit "$existing_pr" --title "$title" --body "$body"
            echo "pr_number=${existing_pr}" >>"$GITHUB_ENV"
          else
            gh pr create \
              --base main \
              --head "$SOURCE_REF" \
              --title "$title" \
              --body "$body"
            pr_number=$(gh pr list \
              --base main \
              --head "$SOURCE_REF" \
              --state open \
              --json number \
              --jq '.[0].number')
            echo "pr_number=${pr_number}" >>"$GITHUB_ENV"
          fi

      - name: Enable auto-merge
        if: ${{ inputs.enable_auto_merge }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "$pr_number" --auto --merge
